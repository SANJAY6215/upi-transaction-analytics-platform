version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: upi_postgres
    restart: always
    environment:
      POSTGRES_USER: upi_user
      POSTGRES_PASSWORD: upi_password
      POSTGRES_DB: upi_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: upi_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@upi.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  airflow:
    image: apache/airflow:2.8.1
    container_name: upi_airflow
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - ../airflow:/opt/airflow/dags
      - ../:/opt/airflow/project
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    command: >
      bash -c "
      airflow db init &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@admin.com &&
      airflow webserver --port 8080 &
      airflow scheduler
      "

volumes:
  pgdata: